<div id="error" class="error-message" style="display: none;">
    <p>Unable to load movies from Letterboxd. Please check the username in the code or try again later.</p>
</div>
<section id="movie-stats-panel" class="movie-stats-panel" aria-label="Watch stats" style="min-height: 80vh;">
    <div class="stats-header">
        <h2>Watch stats</h2>
        <button type="button" class="stats-toggle" aria-expanded="true" aria-controls="movie-stats-panel" aria-label="Hide stats">
            <svg class="stats-toggle-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
                <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </button>
    </div>
    <div class="stats-body"></div>
</section>
<div id="movies-container" class="movies-grid"></div>
