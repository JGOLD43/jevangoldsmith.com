      Sveltia CMS — a Decap-compatible, git-backed admin UI. It reads/writes the
      JSON files in data/ directly via the GitHub API; there is no backend.
      Config lives in ./config.yml (auto-loaded). Authentication requires a
      GitHub OAuth App + an auth relay — see docs/cms-setup.md.

      This page is intentionally excluded from the site's strict CSP
      (scripts/update-csp-hashes.js skips dist/admin) because the CMS loads its
      bundle from a CDN and talks to api.github.com.
    -->
