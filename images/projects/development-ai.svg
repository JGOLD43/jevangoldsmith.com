<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Code editor with AI suggestion overlay">
  <rect width="600" height="400" fill="#f5f3ed"/>
  <rect x="40" y="40" width="520" height="320" rx="10" fill="#1e1e2e"/>
  <rect x="40" y="40" width="520" height="34" rx="10" fill="#15151f"/>
  <circle cx="62" cy="57" r="5" fill="#ff6b6b"/>
  <circle cx="80" cy="57" r="5" fill="#f5c542"/>
  <circle cx="98" cy="57" r="5" fill="#7bd389"/>
  <rect x="200" y="48" width="200" height="18" rx="4" fill="#2a2a3a"/>
  <text x="300" y="61" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#7a7a90">build.ts — agent.ts</text>

  <g font-family="ui-monospace,Menlo,monospace" font-size="13">
    <text x="64" y="108" fill="#7a7a90">1</text>
    <text x="92" y="108" fill="#c084fc">function</text>
    <text x="160" y="108" fill="#67e8f9">ship</text>
    <text x="195" y="108" fill="#e2e2ea">() {</text>

    <text x="64" y="132" fill="#7a7a90">2</text>
    <text x="108" y="132" fill="#c084fc">const</text>
    <text x="156" y="132" fill="#e2e2ea">plan = </text>
    <text x="216" y="132" fill="#67e8f9">draft</text>
    <text x="256" y="132" fill="#e2e2ea">(spec)</text>

    <text x="64" y="156" fill="#7a7a90">3</text>
    <text x="108" y="156" fill="#c084fc">const</text>
    <text x="156" y="156" fill="#e2e2ea">diff = </text>
    <text x="212" y="156" fill="#67e8f9">implement</text>
    <text x="288" y="156" fill="#e2e2ea">(plan)</text>

    <text x="64" y="180" fill="#7a7a90">4</text>
    <text x="108" y="180" fill="#c084fc">const</text>
    <text x="156" y="180" fill="#e2e2ea">ok   = </text>
    <text x="212" y="180" fill="#67e8f9">verify</text>
    <text x="262" y="180" fill="#e2e2ea">(diff)</text>

    <text x="64" y="204" fill="#7a7a90">5</text>
    <text x="108" y="204" fill="#c084fc">return</text>
    <text x="160" y="204" fill="#e2e2ea">ok &amp;&amp; </text>
    <text x="208" y="204" fill="#67e8f9">land</text>
    <text x="244" y="204" fill="#e2e2ea">(diff)</text>

    <text x="64" y="228" fill="#7a7a90">6</text>
    <text x="92" y="228" fill="#e2e2ea">}</text>
  </g>

  <g>
    <rect x="92" y="248" width="416" height="92" rx="10" fill="#2a2a3a" stroke="#c9a86c" stroke-width="1.5"/>
    <circle cx="112" cy="268" r="8" fill="#f5c542"/>
    <text x="112" y="272" text-anchor="middle" font-family="Chivo,system-ui,sans-serif" font-size="11" font-weight="700" fill="#2c3e50">AI</text>
    <text x="132" y="272" font-family="Chivo,system-ui,sans-serif" font-size="13" font-weight="700" fill="#f5c542">Suggested patch</text>
    <text x="112" y="300" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#a3e635">+ keep human review before land()</text>
    <text x="112" y="320" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#fda4af">- silent retry on failed verify()</text>
  </g>
</svg>
