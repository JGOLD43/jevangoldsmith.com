    <g stroke="#e1ddc8" stroke-width="1">
      <line x1="84" y1="100" x2="276" y2="100"/>
      <line x1="84" y1="124" x2="276" y2="124"/>
      <line x1="84" y1="148" x2="276" y2="148"/>
      <line x1="84" y1="172" x2="276" y2="172"/>
      <line x1="84" y1="196" x2="276" y2="196"/>
      <line x1="84" y1="220" x2="276" y2="220"/>
      <line x1="84" y1="244" x2="276" y2="244"/>
      <line x1="84" y1="268" x2="276" y2="268"/>
      <line x1="84" y1="292" x2="276" y2="292"/>
      <line x1="324" y1="100" x2="516" y2="100"/>
      <line x1="324" y1="124" x2="516" y2="124"/>
      <line x1="324" y1="148" x2="516" y2="148"/>
      <line x1="324" y1="172" x2="516" y2="172"/>
