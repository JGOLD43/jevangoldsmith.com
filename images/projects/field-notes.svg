  </g>

  <text x="84" y="86" font-family="Chivo,system-ui,sans-serif" font-size="14" font-weight="700" fill="#2c3e50">FIELD NOTES · vol. 01</text>

  <g stroke="#2c3e50" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M84 118 q12 -6 30 0 t40 -2 t60 0 t40 -1"/>
    <path d="M84 142 q22 -8 60 0 t90 -2 t40 -1"/>
    <path d="M84 166 q14 -7 28 0 t36 0 t44 -2 t60 0"/>
    <path d="M84 190 q22 -7 60 0 t80 -1 t44 -2"/>

    <path d="M84 238 q10 -6 24 0 t40 -1 t36 0 t30 -1"/>
    <path d="M84 262 q14 -6 28 0 t40 -2 t60 0"/>
    <path d="M84 286 q18 -7 50 0 t70 -1 t40 -2"/>
  </g>

  <g>
    <rect x="84" y="208" width="60" height="20" rx="10" fill="#f5c542"/>
    <text x="114" y="222" text-anchor="middle" font-family="Chivo,system-ui,sans-serif" font-size="11" font-weight="700" fill="#2c3e50">IDEA</text>
  </g>

  <g font-family="Chivo,system-ui,sans-serif" font-size="13" fill="#2c3e50">
    <text x="324" y="92" font-weight="700">This week →</text>
    <g font-size="12">
      <circle cx="332" cy="120" r="3" fill="#c9a86c"/>
      <text x="344" y="124">one book worth keeping</text>
      <circle cx="332" cy="146" r="3" fill="#c9a86c"/>
