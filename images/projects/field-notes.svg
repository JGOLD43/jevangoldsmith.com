      <circle cx="332" cy="198" r="3" fill="#c9a86c"/>
      <text x="344" y="202">one experiment in progress</text>
    </g>
    <g font-size="12" opacity="0.85">
      <text x="324" y="248">— short enough to send</text>
      <text x="324" y="270">— useful enough to keep</text>
    </g>
  </g>

  <g transform="translate(440,300) rotate(-22)">
    <rect x="0" y="0" width="120" height="14" rx="3" fill="#c9a86c"/>
