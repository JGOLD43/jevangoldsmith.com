name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm ci --prefix site-astro

      - name: Generate merged data files
        run: npm run people:merge || true

      # Use build:fast — skips snap:routes + assets:optimize. The optimize
      # step requires ffmpeg + network reach to Openlibrary, neither of
      # which is reliable on CI. Pre-optimized image variants are already
      # committed in images/generated/, so the dist output has everything
      # it needs. When you add new source images locally, run
      # `npm run assets:optimize` and commit the new variants.
      - run: npm run build:fast

      - name: Add Pages-required files to dist
        run: |
          touch dist/.nojekyll
          cp CNAME dist/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Wait briefly for the CDN cache layer to pick up the new artifact.
      - name: Settle
        run: sleep 30
      - name: Live verification
        run: node scripts/check-live.js
        env:
          HOST: https://jevangoldsmith.com
