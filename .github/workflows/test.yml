name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, refactor/astro]

# Phase 4 slice 4.3: every PR runs lint + astro check + build + smoke +
# Playwright behavioral + visual diff. Failures block merge.

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site-astro/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install site-astro dependencies
        run: npm ci --prefix site-astro

      - name: Install Playwright browsers
        run: npx --prefix site-astro playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Astro type check
        run: npm run --prefix site-astro astro check

      - name: Build
        run: npm run build:fast

      - name: Smoke harness against dist
        run: |
          npx http-server dist -p 8765 -s --cors -c-1 &
          SERVER_PID=$!
          sleep 3
          BASE_URL=http://localhost:8765 npm run smoke
          kill $SERVER_PID || true

      - name: Playwright behavioral + visual smoke
        run: |
          npx http-server dist -p 8766 -s --cors -c-1 &
          SERVER_PID=$!
          sleep 3
          PLAYWRIGHT_BASE=http://localhost:8766 npm run test:browser
          kill $SERVER_PID || true

      - name: Lighthouse perf budget check
        # Advisory only (continue-on-error): Lighthouse timing + total-bytes are
        # noisy (external map tiles/images) and baseline-drift-prone, so this
        # must NOT gate the deploy (deploy = needs this workflow to pass).
        # Deterministic bundle-size regressions are still hard-gated by
        # `perf:budget` (check-performance-budgets.js) during the build above.
        # Refresh the baseline when intentionally heavier:
        #   npm run perf:lighthouse -- --out=docs/perf-baseline.md
        continue-on-error: true
        # Tier 1+2 plan slice 1.2: report when any of the 8 baseline routes
        # regresses past tolerance vs docs/perf-baseline.md.
        run: |
          npx http-server dist -p 8767 -s --cors -c-1 &
          SERVER_PID=$!
          sleep 3
          LIGHTHOUSE_BASE=http://localhost:8767 LIGHTHOUSE_RUNS=2 npm run perf:check
          kill $SERVER_PID || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: site-astro/playwright-report/
          retention-days: 7
