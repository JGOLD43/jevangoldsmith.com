name: Spotify - Sync Followed Shows

on:
  schedule:
    # Monthly: 1st of each month at 03:00 UTC. Snapshots followed shows.
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  # notify-on-failure calls _cron-failure-issue.yml which needs
  # issues:write. Without it the whole workflow fails to start.
  issues: write

concurrency:
  group: spotify-sync-shows
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sync followed shows
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: node scripts/sync/spotify-sync-shows.js
      - name: Commit if changed
        run: |
          if git diff --quiet -- data/podcast-shows.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/podcast-shows.json
          git commit -m "chore: sync followed podcast shows from Spotify"
          git push

  notify-on-failure:
    needs: sync
    if: failure()
    uses: ./.github/workflows/_cron-failure-issue.yml
    with:
      workflow_name: Spotify - Sync Followed Shows
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
