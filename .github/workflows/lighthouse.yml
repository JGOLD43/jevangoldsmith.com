name: Lighthouse perf gate

on:
  pull_request:
    paths:
      - 'site-astro/**'
      - 'scripts/**'
      - 'data/**'
      - 'package.json'
      - 'firebase.json'
      - '.github/workflows/lighthouse.yml'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix site-astro
      - run: npm run build:fast
      - name: Serve dist + run Lighthouse + check budgets
        run: |
          npx http-server dist -p 8765 -s --cors -c-1 &
          SERVER_PID=$!
          sleep 3
          npm run perf:lighthouse
          npm run perf:check
          kill $SERVER_PID || true
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            .perf-tmp/**
            baselines/lighthouse-*.json
          if-no-files-found: ignore
