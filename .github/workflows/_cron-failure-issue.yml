# Reusable workflow: opens (or updates) a GitHub issue when a calling
# cron workflow fails. Dedupes by searching for an open issue tagged
# `cron-failure` with the workflow name in its title; if found, comments;
# otherwise creates a new one.
#
# Called from letterboxd-sync, spotify-*, content-validate via:
#   notify:
#     if: failure()
#     uses: ./.github/workflows/_cron-failure-issue.yml
#     with:
#       workflow_name: ${{ github.workflow }}
#       run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

name: _cron-failure-issue

on:
  workflow_call:
    inputs:
      workflow_name:
        required: true
        type: string
      run_url:
        required: true
        type: string

permissions:
  issues: write
  contents: read

jobs:
  open-or-update-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const workflow = `${{ inputs.workflow_name }}`;
            const runUrl = `${{ inputs.run_url }}`;
            const title = `cron failure: ${workflow}`;
            const body = `Run failed: ${runUrl}\n\nTimestamp: ${new Date().toISOString()}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'cron-failure'
            });
            const match = existing.find((i) => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body
              });
              core.info(`Commented on existing issue #${match.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['cron-failure', 'ops']
              });
              core.info(`Created issue #${created.number}`);
            }
